<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.name}">Chi tiet san pham</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
    <nav class="nav">
        <a th:href="@{/products}">Sản phẩm</a>
        <a th:href="@{/cart}">Giỏ hàng</a>
    </nav>
    
    <div class="container">
        <div class="detail">
            <div>
                <img th:src="${product.thumbnail}" th:alt="${product.name}">
            </div>
            <section>
                <h1 th:text="${product.name}">Ten san pham</h1>
                <p class="category" th:text="${product.category_name}">Danh muc</p>
                
                <!-- Hiển thị Giá có sale và gốc -->
                <div class="price">
                    <span th:text="${#numbers.formatDecimal(product.sale_price != null ? product.sale_price : product.base_price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 VND</span>
                    <span th:if="${product.sale_price != null}" 
                          style="text-decoration: line-through; color: #86868b; font-size: 18px; margin-left: 12px;"
                          th:text="${#numbers.formatDecimal(product.base_price, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></span>
                </div>
                
                <p th:text="${product.description}" style="line-height: 1.6; color: #333; margin-bottom: 32px;">Mo ta</p>

                <form th:action="@{/cart/add}" method="post" class="form">
                    <div>
                        <label style="display:block; margin-bottom:8px; font-weight:500; color:#86868b;">Kích cỡ / Màu sắc</label>
                        <select name="variantId" required style="width:100%;">
                            <option value="">Chọn phiên bản</option>
                            <option th:each="variant : ${variants}"
                                    th:value="${variant.id}"
                                    th:disabled="${variant.stock_quantity <= 0}"
                                    th:text="${variant.size + ' - ' + variant.color + ' (còn ' + variant.stock_quantity + ')'}">Variant</option>
                        </select>
                    </div>

                    <div>
                        <label style="display:block; margin-bottom:8px; font-weight:500; color:#86868b;">Số lượng</label>
                        <input type="number" name="quantity" value="1" min="1" style="width:100px;">
                    </div>

                    <button type="submit" style="margin-top: 16px;">Thêm vào giỏ hàng</button>
                </form>
            </section>
        </div>
    </div>
</body>
</html>
