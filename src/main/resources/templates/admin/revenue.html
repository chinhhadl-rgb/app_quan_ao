<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý thu nhập</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .revenue-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            margin-top: 30px;
        }
        .chart-panel {
            background: #fff;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .stats-summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #eee;
        }
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #0071e3;
            margin-bottom: 4px;
        }
        .stat-label {
            font-size: 13px;
            color: #86868b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body class="admin-body">
<div class="container">
    <nav class="nav">
        <a th:href="@{/admin}">Thống kê</a>
        <a th:href="@{/admin/revenue}" style="color: var(--apple-blue); font-weight: 600;">Thu nhập</a>
        <a th:href="@{/admin/products}">Sản phẩm</a>
        <a th:href="@{/admin/brands}">Thương hiệu</a>
        <a th:href="@{/admin/orders}">Đơn hàng</a>
        <a th:href="@{/admin/users}">Người dùng</a>
        <a th:href="@{/products}">Về shop</a>
    </nav>

    <h1>Quản lý thu nhập năm <span th:text="${T(java.time.Year).now().getValue()}">2024</span></h1>

    <div class="revenue-grid">
        <div class="chart-panel">
            <h3>Doanh thu theo tháng</h3>
            <div style="position: relative; height:350px;">
                <canvas id="monthlyChart"></canvas>
            </div>
        </div>
        <div class="chart-panel">
            <h3>Tỷ lệ doanh thu theo Brand</h3>
            <div style="position: relative; height:350px;">
                <canvas id="brandChart"></canvas>
            </div>
        </div>
    </div>

    <div style="margin-top: 40px;">
        <h3>Chi tiết doanh thu tháng</h3>
        <table>
            <thead>
            <tr>
                <th>Tháng</th>
                <th>Số đơn hàng</th>
                <th>Doanh thu</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="row : ${monthlyRevenue}">
                <td th:text="'Tháng ' + ${row.month}">Tháng 1</td>
                <td th:text="${row.total_orders}">0</td>
                <td th:text="${#numbers.formatDecimal(row.total_revenue, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    document.addEventListener('DOMContentLoaded', function() {
        if (typeof Chart === 'undefined') {
            console.error('Chart.js not loaded');
            return;
        }

        const monthlyData = /*[[${monthlyRevenue}]]*/ [];
        const brandData = /*[[${brandRevenue}]]*/ [];

        // Chart doanh thu tháng
        const months = Array.from({length: 12}, (_, i) => 'Tháng ' + (i + 1));
        const revenueValues = new Array(12).fill(0);
        
        if (monthlyData && monthlyData.length > 0) {
            monthlyData.forEach(item => {
                if (item.month >= 1 && item.month <= 12) {
                    revenueValues[item.month - 1] = item.total_revenue || 0;
                }
            });
        }

        new Chart(document.getElementById('monthlyChart'), {
            type: 'line',
            data: {
                labels: months,
                datasets: [{
                    label: 'Doanh thu (₫)',
                    data: revenueValues,
                    borderColor: '#0071e3',
                    backgroundColor: 'rgba(0, 113, 227, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });

        // Chart doanh thu Brand
        if (brandData && brandData.length > 0) {
            new Chart(document.getElementById('brandChart'), {
                type: 'doughnut',
                data: {
                    labels: brandData.map(d => d.brand_name),
                    datasets: [{
                        data: brandData.map(d => d.revenue),
                        backgroundColor: ['#0071e3', '#34c759', '#ff9500', '#ff3b30', '#af52de', '#5856d6']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        }
    });
    /*]]>*/
</script>
</body>
</html>
